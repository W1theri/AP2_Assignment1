name: Generate Proto Code

on:
  push:
    branches: [main]
    paths:
      - "**/*.proto"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo A (protos)
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install protoc
        run: |
          PROTOC_VERSION=26.1
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip protoc-${PROTOC_VERSION}-linux-x86_64.zip -d $HOME/.local
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install protoc-gen-go and protoc-gen-go-grpc
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate Go code from .proto files
        run: |
          mkdir -p generated/payment generated/order
          protoc \
            --proto_path=. \
            --go_out=generated \
            --go_opt=paths=source_relative \
            --go-grpc_out=generated \
            --go-grpc_opt=paths=source_relative \
            payment/payment.proto

          protoc \
            --proto_path=. \
            --go_out=generated \
            --go_opt=paths=source_relative \
            --go-grpc_out=generated \
            --go-grpc_opt=paths=source_relative \
            order/order.proto

      - name: Checkout Repo B (generated code)
        uses: actions/checkout@v4
        with:
          repository: YOURUSERNAME/ap2-generated
          path: repo-b
          token: ${{ secrets.GEN_REPO_TOKEN }}

      - name: Copy generated files into Repo B
        run: |
          mkdir -p repo-b/payment repo-b/order
          cp generated/payment/*.go repo-b/payment/
          cp generated/order/*.go   repo-b/order/

      - name: Commit and push to Repo B
        working-directory: repo-b
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || \
            git commit -m "chore: regenerate pb.go from protos @ ${{ github.sha }}"
          git push
