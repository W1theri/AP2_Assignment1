version: "3.9"

# Assignment 2: gRPC Migration
#
# Что изменилось по сравнению с Assignment 1:
#   - payment-service: добавлен gRPC порт 50051 (GRPC_PORT)
#   - order-service:   PAYMENT_BASE_URL → PAYMENT_GRPC_ADDR (gRPC клиент)
#                      добавлен gRPC streaming порт 50052 (GRPC_STREAM_PORT)
#   - Миграция 002 добавляет updated_at для стриминга
#
# Всё остальное (volume names, healthchecks, DB credentials) — как в Assignment 1.

services:

  # ── Order Database ────────────────────────────────────────────────────────
  order-db:
    image: postgres:15-alpine
    container_name: order-db
    environment:
      POSTGRES_USER:     order_user
      POSTGRES_PASSWORD: order_pass
      POSTGRES_DB:       order_db
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
      # Assignment 1 migration (unchanged)
      - ./order-service/migrations/001_create_orders.sql:/docker-entrypoint-initdb.d/001_create_orders.sql
      # Assignment 2 migration: adds updated_at for streaming
      - ./order-service/migrations/002_add_updated_at_to_orders.sql:/docker-entrypoint-initdb.d/002_add_updated_at_to_orders.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Payment Database ──────────────────────────────────────────────────────
  payment-db:
    image: postgres:15-alpine
    container_name: payment-db
    environment:
      POSTGRES_USER:     payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB:       payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/migrations/001_create_payments.sql:/docker-entrypoint-initdb.d/001_create_payments.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Payment Service ───────────────────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      DB_HOST:     payment-db
      DB_PORT:     5432
      DB_USER:     payment_user
      DB_PASSWORD: payment_pass
      DB_NAME:     payment_db
      SERVER_PORT: 8081        # HTTP (legacy, сохранён из Assignment 1)
      GRPC_PORT:   :50051      # NEW: gRPC server port
    ports:
      - "8081:8081"
      - "50051:50051"          # NEW: gRPC
    depends_on:
      payment-db:
        condition: service_healthy

  # ── Order Service ─────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      DB_HOST:             order-db
      DB_PORT:             5432
      DB_USER:             order_user
      DB_PASSWORD:         order_pass
      DB_NAME:             order_db
      SERVER_PORT:         8080
      PAYMENT_BASE_URL:    http://payment-service:8081  # сохранён для совместимости
      PAYMENT_GRPC_ADDR:   payment-service:50051        # NEW: gRPC client target
      GRPC_STREAM_PORT:    :50052                       # NEW: gRPC streaming server
    ports:
      - "8080:8080"
      - "50052:50052"          # NEW: gRPC streaming
    depends_on:
      order-db:
        condition: service_healthy
      payment-service:
        condition: service_started

volumes:
  order-db-data:
  payment-db-data:
